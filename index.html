<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Ristoflow</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0E5A7A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="apple-touch-icon" href="/favicon-192.png"/>
  <link rel="icon" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --brand:#0E5A7A;--brand-light:#e8f4f8;--brand-mid:#1a8fb5;
      --accent:#00c896;--bg:#f0f6fa;--surface:#fff;
      --text:#111827;--text-2:#64748b;--text-3:#94a3b8;
      --border:#e5e7eb;--radius:18px;--radius-sm:12px;
      --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

    /* SPINNER */
    .spinner{width:40px;height:40px;border:3px solid var(--brand-light);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .page-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;color:var(--text-2);font-size:13px;font-weight:600;}

    /* AUTH */
    #auth-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px calc(24px + var(--safe-bottom));background:linear-gradient(160deg,#0E5A7A 0%,#1a8fb5 60%,#00c896 100%);overflow-y:auto;}
    .auth-logo{width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;border:1.5px solid rgba(255,255,255,.2);}
    .auth-title{font-size:28px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:4px;}
    .auth-sub{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:32px;text-align:center;line-height:1.5;}
    .auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
    .auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px;}
    .auth-tab{flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-2);transition:all .2s;}
    .auth-tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .auth-form{display:flex;flex-direction:column;gap:12px;}
    .auth-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;background:var(--bg);}
    .auth-input:focus{border-color:var(--brand);background:#fff;}
    .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;}
    .auth-btn:active{opacity:.85;}
    .auth-error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;display:none;margin-bottom:12px;}

    /* APP SHELL */
    #app-shell{display:none;flex-direction:column;height:100vh;height:100dvh;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
    .top-bar-logo{font-size:20px;font-weight:900;color:var(--brand);letter-spacing:-.5px;}
    .top-bar-logo span{color:var(--accent);}
    .top-bar-actions{display:flex;gap:8px;align-items:center;}
    .top-bar-btn{width:36px;height:36px;border:none;background:var(--bg);border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
    .notif-dot::after{content:"";position:absolute;top:6px;right:6px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:2px solid var(--surface);}
    #page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

    /* BOTTOM NAV */
    .bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;border:none;background:none;cursor:pointer;color:var(--text-3);transition:color .2s;}
    .nav-item.active{color:var(--brand);}
    .nav-icon{font-size:22px;line-height:1;}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:.02em;}
    .nav-item.nav-center .nav-icon-wrap{width:48px;height:48px;background:linear-gradient(135deg,var(--brand),var(--accent));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(14,90,122,.35);margin-top:-8px;}

    /* FEED */
    .feed-header{padding:16px 16px 8px;}
    .feed-greeting{font-size:22px;font-weight:900;letter-spacing:-.3px;}
    .feed-greeting span{color:var(--brand);}
    .storie-strip{display:flex;gap:12px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
    .storie-strip::-webkit-scrollbar{display:none;}
    .storia-bubble{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;cursor:pointer;}
    .storia-ring{width:64px;height:64px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,var(--brand),var(--accent));}
    .storia-ring.seen{background:var(--border);}
    .storia-avatar{width:100%;height:100%;border-radius:50%;border:2.5px solid #fff;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;}
    .storia-label{font-size:10px;font-weight:700;color:var(--text-2);max-width:64px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .storia-add .storia-ring{background:var(--bg);border:2px dashed var(--brand);}
    .storia-add .storia-avatar{border:none;font-size:28px;color:var(--brand);background:var(--brand-light);}
    .feed-section-title{font-size:13px;font-weight:800;color:var(--text-2);padding:4px 16px 8px;text-transform:uppercase;letter-spacing:.06em;}

    /* FEED CARD */
    .feed-card{background:var(--surface);margin:0 12px 12px;border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);}
    .feed-card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;}
    .feed-avatar{width:40px;height:40px;border-radius:50%;background:var(--brand-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--brand);}
    .feed-meta{flex:1;min-width:0;}
    .feed-meta-name{font-size:14px;font-weight:800;}
    .feed-meta-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
    .feed-locale-badge{background:var(--brand-light);color:var(--brand);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap;}
    .feed-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--bg);}
    .feed-img-placeholder{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--brand-light),#dbeafe);display:flex;align-items:center;justify-content:center;font-size:48px;}
    .feed-body{padding:12px 14px 0;}
    .feed-text{font-size:14px;line-height:1.55;}

    /* REACTIONS */
    .feed-reactions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
    .reaction-btn{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
    .reaction-btn:active{transform:scale(.92);}
    .reaction-btn.reacted{background:var(--brand-light);border-color:var(--brand);color:var(--brand);}
    .reaction-count{font-size:12px;color:var(--text-2);font-weight:700;}
    .reaction-btn.reacted .reaction-count{color:var(--brand);}
    .feed-points-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;margin-top:8px;margin-bottom:4px;}

    /* COMMENTI */
    .commenti-section{border-top:1px solid var(--border);margin-top:10px;}
    .commenti-toggle{width:100%;background:none;border:none;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--text-2);cursor:pointer;display:flex;align-items:center;gap:6px;}
    .commenti-toggle:hover{color:var(--brand);}
    .commenti-list{padding:0 14px 0;display:none;}
    .commenti-list.open{display:block;}
    .commento-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
    .commento-avatar{width:28px;height:28px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--brand);flex-shrink:0;}
    .commento-bubble{background:var(--bg);border-radius:12px;padding:7px 10px;flex:1;}
    .commento-nome{font-size:11px;font-weight:800;color:var(--brand);margin-bottom:2px;}
    .commento-testo{font-size:13px;line-height:1.4;}
    .commento-data{font-size:10px;color:var(--text-3);margin-top:3px;}
    .commento-input-row{display:flex;gap:8px;padding:8px 14px 12px;align-items:center;border-top:1px solid var(--border);margin-top:4px;}
    .commento-input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);}
    .commento-input:focus{border-color:var(--brand);background:#fff;}
    .commento-send{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

    /* WA BANNER */
    .wa-banner{background:linear-gradient(135deg,#25D366,#128C7E);margin:12px 12px 0;border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
    .wa-banner-icon{font-size:28px;flex-shrink:0;}
    .wa-banner-text{flex:1;}
    .wa-banner-title{font-size:14px;font-weight:800;color:#fff;}
    .wa-banner-sub{font-size:12px;color:rgba(255,255,255,.8);margin-top:2px;}
    .wa-banner-pts{background:rgba(255,255,255,.2);border-radius:999px;padding:4px 12px;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}

    /* EMPTY */
    .empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:12px;text-align:center;}
    .empty-icon{font-size:48px;}
    .empty-title{font-size:17px;font-weight:800;}
    .empty-sub{font-size:13px;color:var(--text-2);line-height:1.5;max-width:260px;}
    .empty-btn{background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;}

    /* SECTION CARD */
    .section-card{background:var(--surface);margin:0 12px 12px;border-radius:var(--radius);padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.05);}
    .section-card-title{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

    /* RICETTE */
    .ricetta-card{background:var(--surface);margin:0 12px 12px;border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.05);cursor:pointer;}
    .ricetta-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:48px;}
    .ricetta-body{padding:12px 14px;}
    .ricetta-nome{font-size:16px;font-weight:800;}
    .ricetta-meta{font-size:12px;color:var(--text-3);margin-top:4px;display:flex;gap:12px;}
    .ricetta-tag{display:inline-block;background:var(--brand-light);color:var(--brand);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700;margin-top:8px;margin-right:4px;}

    /* PROFILO */
    .profilo-header{background:linear-gradient(135deg,var(--brand),var(--brand-mid));padding:24px 20px;text-align:center;color:#fff;}
    .profilo-avatar-wrap{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 12px;}
    .profilo-nome{font-size:20px;font-weight:800;}
    .profilo-email{font-size:13px;opacity:.75;margin-top:2px;}
    .profilo-stats{display:flex;background:var(--surface);margin:0 16px;border-radius:var(--radius);margin-top:-20px;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden;}
    .profilo-stat{flex:1;padding:16px 8px;text-align:center;border-right:1px solid var(--border);}
    .profilo-stat:last-child{border-right:none;}
    .profilo-stat-val{font-size:20px;font-weight:900;color:var(--brand);}
    .profilo-stat-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
    .profilo-section{margin:12px 16px;}
    .profilo-section-title{font-size:12px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding:0 4px;}
    .profilo-row{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:2px;cursor:pointer;}
    .profilo-row-icon{font-size:20px;width:32px;text-align:center;}
    .profilo-row-text{flex:1;font-size:14px;font-weight:600;}
    .profilo-row-arrow{color:var(--text-3);font-size:16px;}
    .profilo-logout{margin:12px 16px 32px;width:calc(100% - 32px);padding:13px;border:1.5px solid #fecaca;background:#fff;color:#dc2626;border-radius:var(--radius-sm);font-size:14px;font-weight:800;cursor:pointer;}

    .pb-nav{padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);}
    .hidden{display:none!important;}
  </style>
</head>
<body>

<div id="initial-loader" class="page-loader">
  <div class="spinner"></div>Caricamento...
</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">🍽️</div>
  <div class="auth-title">Ristoflow</div>
  <div class="auth-sub">Il social della ristorazione.<br>Accumula punti, scopri ricette, condividi esperienze.</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login',this)">Accedi</button>
      <button class="auth-tab" onclick="switchAuthTab('register',this)">Registrati</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="form-login" class="auth-form">
      <input class="auth-input" type="email" id="login-email" placeholder="Email" autocomplete="email"/>
      <input class="auth-input" type="password" id="login-pwd" placeholder="Password" autocomplete="current-password"/>
      <button class="auth-btn" onclick="doLogin()">Entra →</button>
    </div>
    <div id="form-register" class="auth-form hidden">
      <input class="auth-input" type="text" id="reg-nome" placeholder="Nome e cognome"/>
      <input class="auth-input" type="email" id="reg-email" placeholder="Email" autocomplete="email"/>
      <input class="auth-input" type="tel" id="reg-tel" placeholder="Telefono (per WhatsApp)"/>
      <input class="auth-input" type="password" id="reg-pwd" placeholder="Password (min 6 caratteri)" autocomplete="new-password"/>
      <button class="auth-btn" onclick="doRegister()">Crea account →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-shell">
  <div class="top-bar">
    <div class="top-bar-logo">Risto<span>flow</span></div>
    <div class="top-bar-actions">
      <button class="top-bar-btn notif-dot" title="Notifiche">🔔</button>
      <button class="top-bar-btn" onclick="navTo('profilo')" title="Profilo"><span id="topbar-avatar">👤</span></button>
    </div>
  </div>
  <div id="page-content"></div>
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="navTo('home')">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-page="ricette" onclick="navTo('ricette')">
      <span class="nav-icon">👨‍🍳</span><span class="nav-label">Ricette</span>
    </button>
    <button class="nav-item nav-center" data-page="storie" onclick="navTo('storie')">
      <div class="nav-icon-wrap"><span class="nav-icon">📸</span></div>
      <span class="nav-label" style="margin-top:4px;">Storie</span>
    </button>
    <button class="nav-item" data-page="tessera" onclick="navTo('tessera')">
      <span class="nav-icon">🎫</span><span class="nav-label">Tessera</span>
    </button>
    <button class="nav-item" data-page="profilo" onclick="navTo('profilo')">
      <span class="nav-icon">👤</span><span class="nav-label">Profilo</span>
    </button>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPA_URL  = "https://cuhcscpvhypoaplcmtjk.supabase.co";
  var SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGNzY3B2aHlwb2FwbGNtdGprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MjY4MjgsImV4cCI6MjA3OTQwMjgyOH0.q9zAs0oh8F1-whtORHBIORF5jIn1NTS3LvSMWleP0a0";
  var AZIENDA   = "b331365f-17db-4dda-aa2f-77a09427fe42";
  var supa = window.supabase.createClient(SUPA_URL, SUPA_ANON);
  var currentUser = null;
  var myReactions = {}; // { postId: emoji }

  // ── INIT ────────────────────────────────────────────────────────
  async function init(){
    var {data:{session}} = await supa.auth.getSession();
    hide("initial-loader");
    if(session){ currentUser=session.user; showApp(); }
    else showAuth();
    supa.auth.onAuthStateChange(function(ev,sess){
      if(ev==="SIGNED_IN"&&sess){ currentUser=sess.user; showApp(); }
      else if(ev==="SIGNED_OUT"){ currentUser=null; showAuth(); }
    });
  }

  // ── AUTH ────────────────────────────────────────────────────────
  window.switchAuthTab=function(tab,btn){
    document.querySelectorAll(".auth-tab").forEach(function(t){t.classList.remove("active");});
    btn.classList.add("active");
    tab==="login"?(show("form-login"),hide("form-register")):(hide("form-login"),show("form-register"));
    hide("auth-error");
  };
  window.doLogin=async function(){
    var email=val("login-email"),pwd=val("login-pwd");
    if(!email||!pwd){showErr("Inserisci email e password");return;}
    var btn=document.querySelector("#form-login .auth-btn");
    btn.textContent="Accesso...";btn.disabled=true;
    var{error}=await supa.auth.signInWithPassword({email,password:pwd});
    btn.textContent="Entra →";btn.disabled=false;
    if(error)showErr(error.message==="Invalid login credentials"?"Email o password errati":error.message);
  };
  window.doRegister=async function(){
    var nome=val("reg-nome"),email=val("reg-email"),tel=val("reg-tel"),pwd=val("reg-pwd");
    if(!nome||!email||!pwd){showErr("Compila tutti i campi");return;}
    if(pwd.length<6){showErr("Password minimo 6 caratteri");return;}
    var btn=document.querySelector("#form-register .auth-btn");
    btn.textContent="Creazione...";btn.disabled=true;
    var{data,error}=await supa.auth.signUp({email,password:pwd,options:{data:{nome_completo:nome,telefono:tel}}});
    btn.textContent="Crea account →";btn.disabled=false;
    if(error){showErr(error.message);return;}
    if(data.user) await supa.from("clienti_profilo").upsert({user_id:data.user.id,nome_completo:nome,email,telefono:tel},{onConflict:"user_id"});
    showErr("✅ Controlla la tua email per confermare l'account!");
  };
  function showErr(m){var e=document.getElementById("auth-error");e.textContent=m;e.style.display="block";}
  function showAuth(){hide("app-shell");show("auth-screen","flex");}
  window.showAuth=showAuth;
  function showApp(){
    hide("auth-screen");show("app-shell","flex");
    var el=document.getElementById("topbar-avatar");
    if(el&&currentUser?.user_metadata?.nome_completo) el.textContent=currentUser.user_metadata.nome_completo.charAt(0).toUpperCase();
    navTo("home");
  }
  window.doLogout=async function(){await supa.auth.signOut();};

  // ── ROUTER ──────────────────────────────────────────────────────
  window.navTo=function(page){
    document.querySelectorAll(".nav-item").forEach(function(b){b.classList.toggle("active",b.dataset.page===page);});
    var c=document.getElementById("page-content"); c.scrollTop=0;
    ({home:renderHome,storie:renderStorie,ricette:renderRicette,tessera:renderTessera,profilo:renderProfilo}[page]||renderHome)(c);
  };

  // ── HOME / FEED ──────────────────────────────────────────────────
  async function renderHome(c){
    var nome=currentUser?(currentUser.user_metadata?.nome_completo||"Cliente").split(" ")[0]:"";
    c.innerHTML='<div class="page-loader"><div class="spinner"></div></div>';

    var[{data:posts},{data:myReaz}]=await Promise.all([
      supa.from("social_post").select("*,clienti_profilo(nome_completo),sedi(nome)").eq("visibile",true).order("created_at",{ascending:false}).limit(20),
      currentUser?supa.from("social_reactions").select("post_id,emoji").eq("user_id",currentUser.id):{data:[]}
    ]);
    if(myReaz) myReaz.forEach(function(r){myReactions[r.post_id]=r.emoji;});

    var h='<div class="pb-nav">';
    h+='<div class="feed-header"><div class="feed-greeting">Ciao, <span>'+esc(nome)+'</span> 👋</div></div>';
    h+='<div class="wa-banner" onclick="navTo(\'storie\')"><div class="wa-banner-icon">📸</div><div class="wa-banner-text"><div class="wa-banner-title">Pubblica una storia</div><div class="wa-banner-sub">Guadagna punti fidelity</div></div><div class="wa-banner-pts">+50 pt</div></div>';

    // Storie strip
    h+='<div class="storie-strip">';
    h+='<div class="storia-bubble storia-add" onclick="navTo(\'storie\')"><div class="storia-ring"><div class="storia-avatar">＋</div></div><div class="storia-label">La tua</div></div>';
    ["Campo Antico","Trattoria","Catering"].forEach(function(n){
      h+='<div class="storia-bubble" onclick="navTo(\'storie\')"><div class="storia-ring"><div class="storia-avatar">🍽️</div></div><div class="storia-label">'+esc(n)+'</div></div>';
    });
    h+='</div>';
    h+='<div class="feed-section-title">Dal network</div>';

    if(!posts||posts.length===0){
      h+='<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">Il feed è ancora vuoto</div><div class="empty-sub">Sii il primo a condividere una foto del tuo piatto preferito!</div><button class="empty-btn" onclick="navTo(\'storie\')">Pubblica ora</button></div>';
    } else {
      posts.forEach(function(p){
        var autore=p.clienti_profilo?.nome_completo||"Anonimo";
        var locale=p.sedi?.nome||"";
        var miaR=myReactions[p.id]||null;
        var reazioni=[
          {e:"😍",c:"reaz_fuoco",   v:p.reaz_fuoco||0},
          {e:"👏",c:"reaz_applauso",v:p.reaz_applauso||0},
          {e:"🔥",c:"reaz_cuore",   v:p.reaz_cuore||0}
        ];
        h+='<div class="feed-card" id="post-'+p.id+'">';
        h+='<div class="feed-card-header"><div class="feed-avatar">'+esc(autore.charAt(0).toUpperCase())+'</div>';
        h+='<div class="feed-meta"><div class="feed-meta-name">'+esc(autore)+'</div><div class="feed-meta-sub">'+formatData(p.created_at)+'</div></div>';
        if(locale) h+='<div class="feed-locale-badge">📍 '+esc(locale)+'</div>';
        h+='</div>';
        if(p.media_url) h+='<img class="feed-img" src="'+esc(p.media_url)+'" loading="lazy"/>';
        else h+='<div class="feed-img-placeholder">🍝</div>';
        h+='<div class="feed-body"><div class="feed-text">'+esc(p.testo||'')+'</div>';
        // Reactions
        h+='<div class="feed-reactions">';
        reazioni.forEach(function(r){
          var att=miaR===r.e?" reacted":"";
          h+='<button class="reaction-btn'+att+'" id="reaz-'+p.id+'-'+r.c+'" onclick="reagisci('+p.id+',\''+r.e+'\',\''+r.c+'\')">';
          h+=r.e+' <span class="reaction-count" id="cnt-'+p.id+'-'+r.c+'">'+r.v+'</span></button>';
        });
        h+='</div>';
        if(p.punti_assegnati) h+='<div class="feed-points-badge">⭐ +'+p.punti_assegnati+' punti</div>';
        h+='</div>';
        // Commenti
        h+='<div class="commenti-section">';
        h+='<button class="commenti-toggle" onclick="toggleCommenti('+p.id+')">💬 <span id="cmtlabel-'+p.id+'">Commenti</span></button>';
        h+='<div class="commenti-list" id="cmtlist-'+p.id+'">';
        h+='<div id="cmtitems-'+p.id+'"><div style="padding:8px 0;font-size:12px;color:var(--text-3)">Caricamento...</div></div>';
        h+='<div class="commento-input-row">';
        h+='<input class="commento-input" id="cmtinput-'+p.id+'" type="text" placeholder="Scrivi un commento..." onkeydown="if(event.key===\'Enter\')inviaCommento('+p.id+')"/>';
        h+='<button class="commento-send" onclick="inviaCommento('+p.id+')">➤</button>';
        h+='</div></div></div></div>';
      });
    }
    h+='</div>';
    c.innerHTML=h;
  }

  // ── REACTIONS ────────────────────────────────────────────────────
  window.reagisci=async function(postId,emoji,campo){
    if(!currentUser){showAuth();return;}
    var prev=myReactions[postId]||null;

    var aggiornaCnt=function(id,c,delta){
      var el=document.getElementById("cnt-"+id+"-"+c);
      if(el) el.textContent=Math.max(0,parseInt(el.textContent)+delta);
    };
    var aggiornaBtn=function(id,c,attivo){
      var el=document.getElementById("reaz-"+id+"-"+c);
      if(el) el.classList.toggle("reacted",attivo);
    };

    if(prev===emoji){
      // Rimuovi reaction
      await supa.from("social_reactions").delete().eq("user_id",currentUser.id).eq("post_id",postId);
      await supa.rpc("decrementa_reaction",{p_post_id:postId,p_campo:campo}).catch(function(){});
      aggiornaCnt(postId,campo,-1); aggiornaBtn(postId,campo,false);
      delete myReactions[postId];
      return;
    }
    // Cambia/aggiungi reaction
    if(prev){
      var campoPrev=prev==="😍"?"reaz_fuoco":prev==="👏"?"reaz_applauso":"reaz_cuore";
      await supa.rpc("decrementa_reaction",{p_post_id:postId,p_campo:campoPrev}).catch(function(){});
      aggiornaCnt(postId,campoPrev,-1); aggiornaBtn(postId,campoPrev,false);
    }
    await supa.from("social_reactions").upsert({user_id:currentUser.id,post_id:postId,emoji},{onConflict:"user_id,post_id"});
    await supa.rpc("incrementa_reaction",{p_post_id:postId,p_campo:campo}).catch(function(){});
    aggiornaCnt(postId,campo,1); aggiornaBtn(postId,campo,true);
    myReactions[postId]=emoji;
  };

  // ── COMMENTI ────────────────────────────────────────────────────
  window.toggleCommenti=async function(postId){
    var list=document.getElementById("cmtlist-"+postId);
    if(!list) return;
    if(list.classList.toggle("open")) await caricaCommenti(postId);
  };
  async function caricaCommenti(postId){
    var items=document.getElementById("cmtitems-"+postId);
    if(!items) return;
    var{data:cc}=await supa.from("social_commenti").select("*,clienti_profilo(nome_completo)").eq("post_id",postId).order("created_at",{ascending:true}).limit(30);
    var label=document.getElementById("cmtlabel-"+postId);
    if(label) label.textContent="Commenti"+(cc&&cc.length?" ("+cc.length+")":"");
    if(!cc||cc.length===0){items.innerHTML='<div style="padding:8px 0;font-size:12px;color:var(--text-3)">Nessun commento ancora.</div>';return;}
    var h="";
    cc.forEach(function(c){
      var nome=c.clienti_profilo?.nome_completo||"Anonimo";
      h+='<div class="commento-row"><div class="commento-avatar">'+esc(nome.charAt(0).toUpperCase())+'</div>';
      h+='<div class="commento-bubble"><div class="commento-nome">'+esc(nome)+'</div>';
      h+='<div class="commento-testo">'+esc(c.testo)+'</div>';
      h+='<div class="commento-data">'+formatData(c.created_at)+'</div></div></div>';
    });
    items.innerHTML=h;
  }
  window.inviaCommento=async function(postId){
    if(!currentUser){showAuth();return;}
    var input=document.getElementById("cmtinput-"+postId);
    var testo=input?input.value.trim():"";
    if(!testo) return;
    input.value="";
    var{error}=await supa.from("social_commenti").insert({post_id:postId,user_id:currentUser.id,testo});
    if(!error) await caricaCommenti(postId);
  };

  // ── STORIE ──────────────────────────────────────────────────────
  function renderStorie(c){
    if(!currentUser){showAuth();return;}
    var h='<div class="pb-nav">';
    h+='<div style="padding:16px 16px 8px"><div style="font-size:22px;font-weight:900;letter-spacing:-.3px">Storie 📸</div>';
    h+='<div style="font-size:13px;color:var(--text-2);margin-top:4px">Scompaiono dopo 24 ore</div></div>';
    h+='<div class="section-card"><div class="section-card-title">📸 Pubblica una storia</div>';
    h+='<div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:12px">Condividi la tua esperienza. Guadagni <strong>+50 punti</strong> per ogni storia.</div>';
    h+='<div style="background:var(--bg);border:2px dashed var(--border);border-radius:14px;padding:32px;text-align:center;cursor:pointer" onclick="apriUploadStoria()">';
    h+='<div style="font-size:40px;margin-bottom:8px">📷</div><div style="font-size:14px;font-weight:700;color:var(--brand)">Tocca per aggiungere foto/video</div></div>';
    h+='<textarea id="storia-testo" style="width:100%;margin-top:12px;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;resize:none;outline:none" rows="3" placeholder="Racconta la tua esperienza..."></textarea>';
    h+='<button onclick="pubblicaStoria()" style="width:100%;margin-top:8px;padding:13px;background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer">Pubblica e guadagna +50pt 🌟</button></div>';
    h+='<div class="feed-section-title">Storie attive</div>';
    h+='<div class="empty-state"><div class="empty-icon">🕐</div><div class="empty-title">Nessuna storia attiva</div><div class="empty-sub">Le storie degli ultimi 24h appariranno qui.</div></div>';
    h+='</div>';
    c.innerHTML=h;
  }

  // ── RICETTE ─────────────────────────────────────────────────────
  async function renderRicette(c){
    c.innerHTML='<div class="page-loader"><div class="spinner"></div></div>';
    var{data:ricette}=await supa.from("ricette").select("id,nome,descrizione,foto_url,tempo_preparazione,difficolta,categoria").eq("azienda_id",AZIENDA).eq("pubblica",true).order("created_at",{ascending:false}).limit(30);
    var h='<div class="pb-nav">';
    h+='<div style="padding:16px 16px 8px"><div style="font-size:22px;font-weight:900;letter-spacing:-.3px">Ricette 👨‍🍳</div><div style="font-size:13px;color:var(--text-2);margin-top:4px">Dai segreti della cucina</div></div>';
    h+='<div style="padding:0 12px 8px"><input style="width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:var(--surface);outline:none" placeholder="🔍 Cerca ricetta..."/></div>';
    if(!ricette||ricette.length===0){
      h+='<div class="empty-state"><div class="empty-icon">👨‍🍳</div><div class="empty-title">Ricette in arrivo</div><div class="empty-sub">Stiamo preparando le ricette del locale.</div></div>';
    } else {
      ricette.forEach(function(r){
        h+='<div class="ricetta-card" onclick="apriRicetta('+r.id+')">';
        if(r.foto_url) h+='<img class="ricetta-img" src="'+esc(r.foto_url)+'" loading="lazy" style="display:block"/>';
        else h+='<div class="ricetta-img">🍝</div>';
        h+='<div class="ricetta-body"><div class="ricetta-nome">'+esc(r.nome)+'</div><div class="ricetta-meta">';
        if(r.tempo_preparazione) h+='<span>⏱ '+r.tempo_preparazione+' min</span>';
        if(r.difficolta) h+='<span>📊 '+esc(r.difficolta)+'</span>';
        h+='</div>';
        if(r.categoria) h+='<div class="ricetta-tag">'+esc(r.categoria)+'</div>';
        h+='</div></div>';
      });
    }
    h+='</div>';
    c.innerHTML=h;
  }

  // ── TESSERA ─────────────────────────────────────────────────────
  function renderTessera(c){
    if(!currentUser){showAuth();return;}
    c.innerHTML='<iframe src="/fidelity.html?a='+AZIENDA+'" style="width:100%;height:calc(100dvh - 120px);border:none;display:block"></iframe>';
  }

  // ── PROFILO ─────────────────────────────────────────────────────
  async function renderProfilo(c){
    if(!currentUser){showAuth();return;}
    c.innerHTML='<div class="page-loader"><div class="spinner"></div></div>';
    var meta=currentUser.user_metadata||{};
    var nome=meta.nome_completo||currentUser.email||"Cliente";
    var email=currentUser.email||"";
    var{data:profilo}=await supa.from("clienti_profilo").select("punti_totali,visite_totali,storie_pubblicate").eq("user_id",currentUser.id).maybeSingle();
    var h='<div class="pb-nav">';
    h+='<div class="profilo-header"><div class="profilo-avatar-wrap">'+esc(nome.charAt(0).toUpperCase())+'</div>';
    h+='<div class="profilo-nome">'+esc(nome)+'</div><div class="profilo-email">'+esc(email)+'</div></div>';
    h+='<div class="profilo-stats">';
    h+='<div class="profilo-stat"><div class="profilo-stat-val">⭐ '+(profilo?.punti_totali||0)+'</div><div class="profilo-stat-label">Punti</div></div>';
    h+='<div class="profilo-stat"><div class="profilo-stat-val">'+(profilo?.visite_totali||0)+'</div><div class="profilo-stat-label">Visite</div></div>';
    h+='<div class="profilo-stat"><div class="profilo-stat-val">'+(profilo?.storie_pubblicate||0)+'</div><div class="profilo-stat-label">Storie</div></div>';
    h+='</div><div style="height:16px"></div>';
    h+='<div class="profilo-section"><div class="profilo-section-title">Account</div>';
    h+='<div class="profilo-row" onclick="navTo(\'tessera\')"><div class="profilo-row-icon">🎫</div><div class="profilo-row-text">La mia tessera fidelity</div><div class="profilo-row-arrow">›</div></div>';
    h+='<div class="profilo-row"><div class="profilo-row-icon">🔔</div><div class="profilo-row-text">Notifiche</div><div class="profilo-row-arrow">›</div></div>';
    h+='<div class="profilo-row"><div class="profilo-row-icon">🔒</div><div class="profilo-row-text">Privacy e dati</div><div class="profilo-row-arrow">›</div></div></div>';
    h+='<div class="profilo-section"><div class="profilo-section-title">Supporto</div>';
    h+='<div class="profilo-row"><div class="profilo-row-icon">💬</div><div class="profilo-row-text">Contattaci su WhatsApp</div><div class="profilo-row-arrow">›</div></div></div>';
    h+='<button class="profilo-logout" onclick="doLogout()">Esci dall\'account</button></div>';
    c.innerHTML=h;
  }

  // ── AZIONI ──────────────────────────────────────────────────────
  window.apriUploadStoria=function(){
    var i=document.createElement("input"); i.type="file"; i.accept="image/*,video/*";
    i.onchange=function(e){var f=e.target.files[0];if(f)alert("Upload: "+f.name+" — funzione in arrivo!");};
    i.click();
  };
  window.pubblicaStoria=async function(){
    var testo=document.getElementById("storia-testo")?.value||"";
    if(!testo){alert("Scrivi qualcosa sulla tua esperienza!");return;}
    var{error}=await supa.from("social_post").insert({user_id:currentUser.id,testo,tipo:"storia",visibile:true,punti_assegnati:50,azienda_id:AZIENDA,scade_at:new Date(Date.now()+86400000).toISOString()});
    if(!error){
      await supa.rpc("aggiungi_punti_cliente",{p_user_id:currentUser.id,p_punti:50,p_motivo:"storia_pubblicata"}).catch(function(){});
      alert("✅ Storia pubblicata! +50 punti guadagnati 🌟");
      navTo("home");
    }
  };
  window.apriRicetta=function(){alert("Dettaglio ricetta — prossimo modulo!");};

  // ── HELPERS ─────────────────────────────────────────────────────
  function show(id,d){var e=document.getElementById(id);if(e)e.style.display=d||"block";}
  function hide(id){var e=document.getElementById(id);if(e)e.style.display="none";}
  function val(id){var e=document.getElementById(id);return e?e.value.trim():"";}
  function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function formatData(ts){if(!ts)return"";return new Date(ts).toLocaleDateString("it-IT",{day:"2-digit",month:"short"});}

  init();
})();
</script>
</body>
</html>
