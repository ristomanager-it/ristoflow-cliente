<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>RistoflowBook</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#0E5A7A"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="apple-touch-icon" href="/favicon-192.png"/>
  <link rel="icon" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --brand:#0E5A7A;--brand-light:#e8f4f8;--brand-mid:#1a8fb5;
      --accent:#00c896;--bg:#f0f6fa;--surface:#fff;
      --text:#111827;--text-2:#64748b;--text-3:#94a3b8;
      --border:#e5e7eb;--radius:16px;--radius-sm:10px;
      --nav-h:60px;--top-h:52px;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
    .spinner{width:36px;height:36px;border:3px solid var(--brand-light);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .page-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text-2);font-size:13px;font-weight:600;}
    .page-loader.full{height:100vh;}

    /* SCHERMATE FULL */
    .full-screen{position:fixed;inset:0;z-index:300;overflow-y:auto;display:none;}
    .full-screen.active{display:flex;flex-direction:column;}

    /* AUTH */
    #auth-screen{background:linear-gradient(160deg,#0a3f57 0%,#0E5A7A 45%,#00c896 100%);align-items:center;justify-content:flex-start;padding:40px 20px;}
    .auth-card{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.25);margin-top:16px;}
    .auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:20px;}
    .auth-tab{flex:1;padding:9px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;background:transparent;color:var(--text-2);}
    .auth-tab.active{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .auth-input{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);margin-bottom:10px;display:block;}
    .auth-input:focus{border-color:var(--brand);background:#fff;}
    .auth-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--brand),var(--brand-mid));color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;}
    .auth-btn:active{opacity:.88;}
    .auth-error{border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;display:none;margin-bottom:12px;line-height:1.4;}
    .auth-error.err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
    .auth-error.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}

    /* COMPLETA PROFILO */
    #completa-screen{background:linear-gradient(160deg,#0a3f57 0%,#0E5A7A 60%,#00c896 100%);align-items:center;justify-content:flex-start;padding:30px 20px 40px;}
    .completa-card{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.25);margin-top:16px;}
    .completa-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:4px;}
    .completa-sub{font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.5;}
    .avatar-upload{width:80px;height:80px;border-radius:50%;background:var(--brand-light);border:3px dashed var(--brand);display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;margin:0 auto 16px;overflow:hidden;position:relative;}
    .avatar-upload img{width:100%;height:100%;object-fit:cover;}
    .avatar-upload-label{font-size:11px;color:var(--brand);font-weight:700;text-align:center;margin-bottom:16px;cursor:pointer;}
    .completa-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);margin-bottom:10px;display:block;}
    .completa-input:focus{border-color:var(--brand);background:#fff;}
    .interessi-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
    .interesse-btn{padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;}
    .interesse-btn.sel{background:var(--brand-light);border-color:var(--brand);color:var(--brand);}
    .completa-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;margin-top:4px;}
    .skip-btn{width:100%;background:none;border:none;font-size:13px;font-weight:700;color:var(--text-3);cursor:pointer;padding:10px;margin-top:4px;}

    /* CONFERMA EMAIL */
    #conferma-screen{background:linear-gradient(160deg,#0a3f57 0%,#0E5A7A 45%,#00c896 100%);align-items:center;justify-content:center;padding:40px 20px;}

    /* APP */
    #app-shell{display:none;flex-direction:column;height:100vh;height:100dvh;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:calc(var(--top-h) + var(--safe-top));padding-top:var(--safe-top);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:100;}
    .top-bar-logo{font-size:22px;font-weight:900;letter-spacing:-.8px;}
    .l-risto{color:var(--brand);}
    .l-flow{color:var(--accent);}
    .l-book{color:#f97316;}
    .top-bar-right{display:flex;gap:6px;}
    .top-btn{width:38px;height:38px;border:none;background:var(--bg);border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
    .notif-dot::after{content:"";position:absolute;top:7px;right:7px;width:9px;height:9px;background:#ef4444;border-radius:50%;border:2px solid var(--surface);}
    .top-avatar-circle{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--accent));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;overflow:hidden;}
    .top-avatar-circle img{width:100%;height:100%;object-fit:cover;}
    #page-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;background:var(--bg);}
    .bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;height:calc(var(--nav-h) + var(--safe-bottom));}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0;border:none;background:none;cursor:pointer;color:var(--text-3);overflow:visible;}
    .nav-item.active{color:var(--brand);}
    .nav-icon{font-size:24px;line-height:1;}
    .nav-label{font-size:10px;font-weight:700;letter-spacing:.02em;}
    .nav-center-wrap{width:52px;height:52px;background:linear-gradient(135deg,var(--brand),var(--accent));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 18px rgba(14,90,122,.4);margin-top:-14px;}

    /* FEED */
    .filtri-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 0;}
    .filtri-strip{display:flex;gap:8px;padding:0 12px;overflow-x:auto;scrollbar-width:none;}
    .filtri-strip::-webkit-scrollbar{display:none;}
    .filtro-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;color:var(--text-2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .filtro-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;}
    .storie-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 0;}
    .storie-strip{display:flex;gap:10px;padding:0 12px;overflow-x:auto;scrollbar-width:none;}
    .storie-strip::-webkit-scrollbar{display:none;}
    .storia-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;width:68px;}
    .storia-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,var(--brand),var(--accent));}
    .storia-add-ring{background:none;border:2px dashed var(--brand);display:flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;}
    .storia-inner{width:100%;height:100%;border-radius:50%;border:2.5px solid #fff;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:22px;}
    .storia-add-inner{width:52px;height:52px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--brand);font-weight:900;}
    .storia-label{font-size:10px;font-weight:600;color:var(--text-2);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .feed-post{background:var(--surface);margin-bottom:8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .post-header{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
    .post-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--brand-light),var(--brand-mid));flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--brand);}
    .post-meta{flex:1;min-width:0;}
    .post-nome{font-size:15px;font-weight:800;}
    .post-sub{font-size:12px;color:var(--text-3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
    .badge{border-radius:999px;padding:2px 8px;font-size:11px;font-weight:700;}
    .badge-locale{background:var(--brand-light);color:var(--brand);}
    .badge-cat{background:var(--bg);color:var(--text-2);border:1px solid var(--border);}
    .badge-titolare{background:#fef3c7;color:#d97706;}
    .badge-verificato{background:#dcfce7;color:#16a34a;}
    .post-testo{font-size:15px;line-height:1.55;color:var(--text);padding:0 14px 10px;}
    .post-img{width:100%;display:block;max-height:500px;object-fit:cover;}
    .post-img-placeholder{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,var(--brand-light),#dbeafe);display:flex;align-items:center;justify-content:center;font-size:64px;}
    .stelle-wrap{padding:4px 14px 8px;display:flex;align-items:center;gap:8px;}
    .post-counts{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);}
    .counts-left{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-2);}
    .counts-emojis{display:flex;margin-right:3px;}
    .counts-emojis span{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--surface);border:1.5px solid var(--bg);margin-left:-4px;}
    .counts-emojis span:first-child{margin-left:0;}
    .counts-right{font-size:13px;color:var(--text-2);cursor:pointer;}
    .post-actions{display:flex;border-bottom:1px solid var(--border);}
    .action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 2px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:700;color:var(--text-2);}
    .action-btn.liked{color:var(--brand);}
    .act-icon{font-size:18px;line-height:1;}
    .commenti-list{display:none;}
    .commenti-list.open{display:block;}
    .commento-row{display:flex;gap:8px;margin-bottom:8px;padding:0 14px;}
    .commento-av{width:30px;height:30px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--brand);flex-shrink:0;}
    .commento-bubble{background:var(--bg);border-radius:14px;padding:8px 12px;flex:1;}
    .commento-nome{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:2px;}
    .commento-testo{font-size:13px;line-height:1.4;}
    .commento-data{font-size:10px;color:var(--text-3);margin-top:3px;}
    .commento-input-row{display:flex;gap:8px;padding:8px 14px 12px;align-items:center;}
    .commento-input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:999px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);}
    .commento-input:focus{border-color:var(--brand);background:#fff;}
    .commento-send-btn{width:36px;height:36px;border-radius:50%;background:var(--brand);color:#fff;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .points-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;margin:4px 14px 8px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;pointer-events:none;}
    .modal-overlay.open{display:flex;pointer-events:all;}
    .modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bottom));}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:999px;margin:0 auto 16px;}
    .modal-title{font-size:18px;font-weight:900;margin-bottom:16px;}
    .tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
    .tipo-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;}
    .tipo-btn.selected{border-color:var(--brand);background:var(--brand-light);}
    .tipo-icon{font-size:28px;}
    .tipo-label{font-size:11px;font-weight:700;color:var(--text-2);}
    .tipo-btn.selected .tipo-label{color:var(--brand);}
    .pub-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;background:var(--bg);margin-bottom:10px;color:var(--text);display:block;}
    .pub-input:focus{border-color:var(--brand);background:#fff;}
    .pub-textarea{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;outline:none;background:var(--bg);resize:none;margin-bottom:10px;min-height:100px;color:var(--text);display:block;}
    .pub-textarea:focus{border-color:var(--brand);background:#fff;}
    .upload-zone{background:var(--bg);border:2px dashed var(--border);border-radius:14px;padding:24px;text-align:center;cursor:pointer;margin-bottom:12px;}
    .pub-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;}
    .stella-sel{display:flex;gap:10px;margin-bottom:14px;}
    .stella-sel span{font-size:32px;cursor:pointer;opacity:.3;}
    .stella-sel span.on{opacity:1;}
    .back-btn{background:none;border:none;font-size:13px;font-weight:700;color:var(--text-2);cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:4px;}
    .ricette-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 12px;}
    .ricetta-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;}
    .ricetta-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:40px;}
    .ricetta-body{padding:10px;}
    .ricetta-nome{font-size:13px;font-weight:800;line-height:1.3;}
    .ricetta-meta{font-size:11px;color:var(--text-3);margin-top:4px;}
    .ricetta-tag{display:inline-block;background:var(--brand-light);color:var(--brand);border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:6px;}
    .profilo-hero{background:linear-gradient(135deg,var(--brand),var(--brand-mid));padding:28px 20px 44px;text-align:center;color:#fff;position:relative;}
    .profilo-av{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 12px;overflow:hidden;cursor:pointer;}
    .profilo-av img{width:100%;height:100%;object-fit:cover;}
    .profilo-nome-el{font-size:22px;font-weight:900;}
    .profilo-email-el{font-size:13px;opacity:.75;margin-top:3px;}
    .profilo-bio-el{font-size:13px;opacity:.8;margin-top:4px;line-height:1.4;}
    .profilo-livello-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:700;margin-top:10px;}
    .profilo-stats{display:flex;background:var(--surface);margin:-24px 16px 0;border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.1);overflow:hidden;position:relative;z-index:1;}
    .p-stat{flex:1;padding:14px 6px;text-align:center;border-right:1px solid var(--border);}
    .p-stat:last-child{border-right:none;}
    .p-stat-val{font-size:18px;font-weight:900;color:var(--brand);}
    .p-stat-label{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
    .punti-bar-wrap{margin:16px 16px 0;background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
    .punti-bar-labels{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px;}
    .punti-bar-track{background:var(--bg);border-radius:999px;height:10px;overflow:hidden;}
    .punti-bar-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:999px;}
    .punti-next-label{font-size:12px;color:var(--text-3);margin-top:6px;text-align:center;}
    .profilo-menu{margin:12px 12px 0;}
    .menu-group-title{font-size:11px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;padding:8px 4px 6px;}
    .menu-row{display:flex;align-items:center;gap:12px;background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:2px;cursor:pointer;}
    .menu-row-icon{font-size:20px;width:32px;text-align:center;}
    .menu-row-text{flex:1;font-size:15px;font-weight:600;}
    .menu-row-arrow{color:var(--text-3);font-size:18px;}
    .logout-btn{margin:16px 12px 32px;width:calc(100% - 24px);padding:14px;border:1.5px solid #fecaca;background:#fff;color:#dc2626;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;}
    .empty-state{display:flex;flex-direction:column;align-items:center;padding:48px 24px;gap:12px;text-align:center;}
    .empty-icon{font-size:52px;}
    .empty-title{font-size:18px;font-weight:800;}
    .empty-sub{font-size:14px;color:var(--text-2);line-height:1.5;max-width:260px;}
    .empty-btn{background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px 28px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;}
    .pb-nav{padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);}
    .hidden{display:none!important;}

    /* STORIA VIEWER */
    #storia-viewer{position:fixed;inset:0;z-index:500;background:#000;display:none;flex-direction:column;}
    #storia-viewer.open{display:flex;}
    .storia-progress{display:flex;gap:4px;padding:calc(12px + var(--safe-top)) 12px 0;}
    .storia-bar{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:999px;overflow:hidden;}
    .storia-bar-fill{height:100%;background:#fff;width:0%;}
    .storia-header{display:flex;align-items:center;gap:10px;padding:10px 12px;}
    .storia-av{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
    .storia-nome{font-size:14px;font-weight:700;color:#fff;flex:1;}
    .storia-chiudi{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;padding:0 4px;line-height:1;}
    .storia-media{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
    .storia-media img,.storia-media video{width:100%;height:100%;object-fit:contain;}
    .storia-testo-overlay{padding:0 20px 20px;text-align:center;}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  var SUPA_URL="https://cuhcscpvhypoaplcmtjk.supabase.co";
  var SUPA_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aGNzY3B2aHlwb2FwbGNtdGprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM4MjY4MjgsImV4cCI6MjA3OTQwMjgyOH0.q9zAs0oh8F1-whtORHBIORF5jIn1NTS3LvSMWleP0a0";
  var AZIENDA="b331365f-17db-4dda-aa2f-77a09427fe42";
  var supa=window.supabase.createClient(SUPA_URL,SUPA_ANON);
  var ME=null,myReaz={},filtroAttivo="tutti",tipoSel=null,votoSel=0,uploadFile=null,avatarFileCompleta=null;
  var interessiSelezionati=[];

  async function init(){
    hideAll();
    var{data:{session}}=await supa.auth.getSession();
    if(session){
      ME=session.user;
      var profiloCompleto=await checkProfiloCompleto();
      if(profiloCompleto)showApp();
      else showCompleta();
      return;
    }
    showAuth();
    supa.auth.onAuthStateChange(async function(ev,sess){
      if(ev==="SIGNED_IN"&&sess){
        ME=sess.user;
        var ok=await checkProfiloCompleto();
        if(ok)showApp();else showCompleta();
      }else if(ev==="SIGNED_OUT"){ME=null;showAuth();}
    });
  }

  async function checkProfiloCompleto(){
    if(!ME)return false;
    var{data}=await supa.from("clienti_profilo").select("nome_completo,citta").eq("user_id",ME.id).maybeSingle();
    return !!(data&&data.citta);
  }

  function hideAll(){
    document.getElementById("initial-loader").style.display="none";
    document.getElementById("auth-screen").classList.remove("active");
    document.getElementById("conferma-screen").classList.remove("active");
    document.getElementById("completa-screen").classList.remove("active");
    document.getElementById("app-shell").style.display="none";
  }

  window.showAuth=function(){hideAll();document.getElementById("auth-screen").classList.add("active");};
  function showConferma(email){hideAll();document.getElementById("conferma-screen").classList.add("active");document.getElementById("conferma-email-txt").innerHTML="Abbiamo inviato un link di conferma a:<br><strong>"+esc(email)+"</strong>";}
  function showCompleta(){hideAll();document.getElementById("completa-screen").classList.add("active");}
  function showApp(){
    hideAll();
    document.getElementById("app-shell").style.display="flex";
    aggiornaTopAvatar();
    navTo("home");
  }

  function aggiornaTopAvatar(){
    var av=document.getElementById("top-av");
    if(!av)return;
    var nome=(ME&&ME.user_metadata&&ME.user_metadata.nome_completo)||"";
    if(nome)av.textContent=nome.charAt(0).toUpperCase();
  }

  window.switchTab=function(tab,btn){
    document.querySelectorAll(".auth-tab").forEach(function(t){t.classList.remove("active");});
    btn.classList.add("active");
    document.getElementById("form-login").style.display=tab==="login"?"block":"none";
    document.getElementById("form-register").style.display=tab==="register"?"block":"none";
    var msg=document.getElementById("auth-msg");msg.style.display="none";
  };

  function showMsg(txt,ok){
    var el=document.getElementById("auth-msg");
    el.textContent=txt;
    el.className="auth-error "+(ok?"ok":"err");
    el.style.display="block";
  }

  window.doLogin=async function(){
    var email=val("login-email"),pwd=val("login-pwd");
    if(!email||!pwd){showMsg("Inserisci email e password");return;}
    var btn=document.querySelector("#form-login .auth-btn");
    if(btn){btn.textContent="...";btn.disabled=true;}
    var{error}=await supa.auth.signInWithPassword({email,password:pwd});
    if(btn){btn.textContent="Entra \u2192";btn.disabled=false;}
    if(error)showMsg(error.message==="Invalid login credentials"?"Email o password errati":error.message);
  };

  window.doRegister=async function(){
    var nome=val("reg-nome"),email=val("reg-email"),tel=val("reg-tel"),pwd=val("reg-pwd");
    if(!nome||!email||!pwd){showMsg("Compila tutti i campi");return;}
    if(pwd.length<6){showMsg("Password minimo 6 caratteri");return;}
    var btn=document.querySelector("#form-register .auth-btn");
    if(btn){btn.textContent="...";btn.disabled=true;}
    var{data,error}=await supa.auth.signUp({
      email,password:pwd,
      options:{
        emailRedirectTo:"https://social.ristoflow-ai.com",
        data:{nome_completo:nome,telefono:tel}
      }
    });
    if(btn){btn.textContent="Crea account \u2192";btn.disabled=false;}
    if(error){showMsg(error.message);return;}
    // Salva profilo base
    if(data.user){
      try{await supa.from("clienti_profilo").upsert({user_id:data.user.id,nome_completo:nome,email,telefono:tel},{onConflict:"user_id"});}catch(e){}
    }
    showConferma(email);
  };

  window.doLogout=async function(){await supa.auth.signOut();};

  // COMPLETA PROFILO
  window.cambiaFotoCompleta=function(){
    var i=document.createElement("input");i.type="file";i.accept="image/*";
    i.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      avatarFileCompleta=f;
      var av=document.getElementById("avatar-completa");
      var url=URL.createObjectURL(f);
      av.innerHTML='<img src="'+url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>';
    };
    i.click();
  };

  window.toggleInteresse=function(btn,nome){
    btn.classList.toggle("sel");
    if(btn.classList.contains("sel")){
      if(!interessiSelezionati.includes(nome))interessiSelezionati.push(nome);
    }else{
      interessiSelezionati=interessiSelezionati.filter(function(i){return i!==nome;});
    }
  };

  window.salvaProfiloCompleto=async function(){
    if(!ME)return;
    var citta=val("c-citta"),nascita=val("c-nascita"),lavoro=val("c-lavoro");
    var btn=document.querySelector("#completa-screen .completa-btn");
    if(btn){btn.textContent="Salvataggio...";btn.disabled=true;}
    var avatarUrl=null;
    if(avatarFileCompleta){
      var ext=avatarFileCompleta.name.split(".").pop().toLowerCase();
      var path="avatar/"+ME.id+"."+ext;
      var{error:upErr}=await supa.storage.from("profili").upload(path,avatarFileCompleta,{cacheControl:"3600",upsert:true});
      if(!upErr){var{data:ud}=supa.storage.from("profili").getPublicUrl(path);avatarUrl=ud.publicUrl;}
    }
    var payload={user_id:ME.id,citta:citta||" ",data_nascita:nascita||null,bio:lavoro||null,interessi:interessiSelezionati.length?JSON.stringify(interessiSelezionati):null};
    if(avatarUrl)payload.avatar_url=avatarUrl;
    await supa.from("clienti_profilo").upsert(payload,{onConflict:"user_id"});
    if(btn){btn.textContent="Entra nel social \u2192";btn.disabled=false;}
    showApp();
  };

  window.saltaCompleta=async function(){
    if(!ME)return;
    await supa.from("clienti_profilo").upsert({user_id:ME.id,citta:" "},{onConflict:"user_id"});
    showApp();
  };

  // ROUTER
  window.navTo=function(page){
    document.querySelectorAll(".nav-item").forEach(function(b){b.classList.toggle("active",b.dataset.page===page);});
    var c=document.getElementById("page-content");c.scrollTop=0;
    var pages={home:renderHome,ricette:renderRicette,tessera:renderTessera,profilo:renderProfilo,locali:renderLocali};
    (pages[page]||renderHome)(c);
  };

  async function renderHome(c){
    c.innerHTML='<div class="page-loader"><div class="spinner"></div></div>';
    var q=supa.from("v_social_feed").select("*").eq("visibile",true).order("created_at",{ascending:false}).limit(20);
    if(filtroAttivo!=="tutti")q=q.eq("categoria",filtroAttivo);
    var[{data:posts},{data:reaz}]=await Promise.all([q,ME?supa.from("social_reactions").select("post_id,emoji").eq("user_id",ME.id):{data:[]}]);
    if(reaz)reaz.forEach(function(r){myReaz[r.post_id]=r.emoji;});
    var h='<div class="pb-nav">';
    h+='<div class="storie-wrap"><div class="storie-strip">';
    h+='<div class="storia-item" onclick="apriPubblica(\'storia\')"><div class="storia-add-ring"><div class="storia-add-inner">+</div></div><div class="storia-label">La tua</div></div>';
    // Storie reali dal DB
    var{data:storieDB}=await supa.from("v_social_feed").select("id,user_id,nome_completo,avatar_url,media_url,testo,created_at").eq("tipo","storia").eq("visibile",true).gt("scade_at",new Date().toISOString()).order("created_at",{ascending:false}).limit(20);
    if(storieDB&&storieDB.length>0){
      var gruppi={};
      storieDB.forEach(function(s){if(!gruppi[s.user_id])gruppi[s.user_id]=[];gruppi[s.user_id].push(s);});
      Object.keys(gruppi).forEach(function(uid){
        var grup=gruppi[uid];var s=grup[0];
        var nome=(s.nome_completo||"?");
        var av=s.avatar_url?'<img src="'+esc(s.avatar_url)+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/>':esc(nome.charAt(0).toUpperCase());
        var encoded=encodeURIComponent(JSON.stringify(grup));
        h+='<div class="storia-item" onclick="apriStoriaEncoded(this)"  data-g="'+encoded+'">';
        h+='<div class="storia-ring"><div class="storia-inner" style="overflow:hidden;font-size:18px;font-weight:800;color:var(--brand)">'+av+'</div></div>';
        h+='<div class="storia-label">'+esc(nome.split(" ")[0])+'</div></div>';
      });

  window.reagisci=async function(postId,emojiKey,campo){
    if(!ME){showAuth();return;}
    var emojiMap={fuoco:"&#128525;",applauso:"&#128079;",cuore:"&#128293;"};
    var emoji=emojiMap[emojiKey];
    var prev=myReaz[postId]||null;
    var updBtn=function(id,c,on){var e=document.getElementById("reaz-"+id+"-"+c);if(e)e.classList.toggle("liked",on);};
    if(prev===emoji){
      await supa.from("social_reactions").delete().eq("user_id",ME.id).eq("post_id",postId);
      try{await supa.rpc("decrementa_reaction",{p_post_id:postId,p_campo:campo});}catch(e){}
      updBtn(postId,campo,false);delete myReaz[postId];return;
    }
    if(prev){
      var cpMap={"&#128525;":"reaz_fuoco","&#128079;":"reaz_applauso","&#128293;":"reaz_cuore"};
      var cp=cpMap[prev];
      if(cp){try{await supa.rpc("decrementa_reaction",{p_post_id:postId,p_campo:cp});}catch(e){}updBtn(postId,cp,false);}
    }
    await supa.from("social_reactions").upsert({user_id:ME.id,post_id:postId,emoji},{onConflict:"user_id,post_id"});
    try{await supa.rpc("incrementa_reaction",{p_post_id:postId,p_campo:campo});}catch(e){}
    updBtn(postId,campo,true);myReaz[postId]=emoji;
  };

  window.pubblica=async function(tipo){
    if(!ME)return;
    var testo=val("pub-testo"),titolo=val("pub-titolo")||"",luogo=val("pub-luogo")||"";
    var catMap={esperienza:"esperienze",storia:"esperienze",ricetta:"ricette",recensione:"recensioni",offerta:"offerte",lavoro:"lavoro","cerco-lavoro":"lavoro"};
    var puntiMap={esperienza:30,storia:50,ricetta:80,recensione:100,offerta:0,lavoro:0,"cerco-lavoro":0};
    var cat=catMap[tipo]||"esperienze";
    var punti=puntiMap[tipo]||0;
    var testoCompleto=titolo?(titolo+(testo?"\n\n"+testo:"")):(testo);
    if(luogo)testoCompleto+="\n\nZona: "+luogo;
    if(!testoCompleto&&!uploadFile){alert("Scrivi qualcosa o aggiungi una foto!");return;}
    var mediaUrl=null;
    if(uploadFile){
      var ext=uploadFile.name.split(".").pop().toLowerCase();
      var path="posts/"+ME.id+"-"+Date.now()+"."+ext;
      var{error:upErr}=await supa.storage.from("social-media").upload(path,uploadFile,{cacheControl:"3600",upsert:false});
      if(upErr){alert("Errore upload: "+upErr.message);return;}
      var{data:urlData}=supa.storage.from("social-media").getPublicUrl(path);
      mediaUrl=urlData.publicUrl;uploadFile=null;
    }
    var payload={user_id:ME.id,testo:testoCompleto||" ",tipo:tipo,categoria:cat,visibile:true,punti_assegnati:punti,azienda_id:AZIENDA};
    if(mediaUrl)payload.media_url=mediaUrl;
    if(tipo==="storia")payload.scade_at=new Date(Date.now()+86400000).toISOString();
    if(tipo==="recensione"&&votoSel)payload.voto=votoSel;
    var{error}=await supa.from("social_post").insert(payload);
    if(error){alert("Errore: "+error.message);return;}
    if(punti>0)try{await supa.rpc("aggiungi_punti_cliente",{p_user_id:ME.id,p_punti:punti,p_motivo:tipo+"_pubblicato"});}catch(e){}
    chiudiModale();filtroAttivo="tutti";navTo("home");
    if(punti>0)setTimeout(function(){alert("Pubblicato! +"+punti+" punti guadagnati");},300);
  };

  async function caricaTessera(){
    var el=document.getElementById("tessera-content");if(!el)return;
    var{data:profilo}=await supa.from("clienti_profilo").select("*").eq("user_id",ME.id).maybeSingle();
    var ptSocial=(profilo&&profilo.punti_social)||0;
    var ptVisite=(profilo&&profilo.punti_totali)||0;
    var ptGlobali=ptSocial+ptVisite;
    var nome=(ME&&ME.user_metadata&&ME.user_metadata.nome_completo)||"Cliente";
    var livello="Bronzo",nextLiv=2000,nextNome="Argento";
    if(ptGlobali>=10000){livello="Platinum";nextLiv=20000;nextNome="Diamond";}
    else if(ptGlobali>=5000){livello="Oro";nextLiv=10000;nextNome="Platinum";}
    else if(ptGlobali>=2000){livello="Argento";nextLiv=5000;nextNome="Oro";}
    var livIco={"Bronzo":"&#129355;","Argento":"&#129354;","Oro":"&#129353;","Platinum":"&#128142;","Diamond":"&#128142;"}[livello]||"";
    var pct=Math.min(100,Math.round((ptGlobali/nextLiv)*100));

    var h='';

    // CARD TESSERA
    h+='<div style="background:linear-gradient(135deg,#0a3f57,#0E5A7A,#1a8fb5);margin:0 16px;border-radius:24px;padding:28px 24px;color:#fff;box-shadow:0 8px 32px rgba(14,90,122,.4);position:relative;overflow:hidden">';
    h+='<div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)"></div>';
    h+='<div style="font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Rete Ristoflow</div>';
    h+='<div style="font-size:20px;font-weight:900;margin-bottom:20px">'+esc(nome)+'</div>';
    h+='<div style="display:flex;align-items:flex-end;justify-content:space-between">';
    h+='<div><div style="font-size:11px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.06em">Livello</div>';
    h+='<div style="font-size:28px;font-weight:900;line-height:1.1">'+livIco+' '+livello+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:11px;opacity:.7">Punti globali</div>';
    h+='<div style="font-size:32px;font-weight:900">'+ptGlobali.toLocaleString("it-IT")+'</div></div>';
    h+='</div></div>';

    // BARRA PROGRESSO
    h+='<div style="margin:12px 16px 0;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)">';
    h+='<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px"><span>'+livIco+' '+livello+'</span><span>'+ptGlobali.toLocaleString("it-IT")+' / '+nextLiv.toLocaleString("it-IT")+'</span></div>';
    h+='<div style="background:#f0f6fa;border-radius:999px;height:10px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,#0E5A7A,#00c896);border-radius:999px;width:'+pct+'%;transition:width .6s ease"></div></div>';
    h+='<div style="font-size:12px;color:#94a3b8;margin-top:6px;text-align:center">Ancora '+Math.max(0,nextLiv-ptGlobali).toLocaleString("it-IT")+' punti per '+nextNome+'</div></div>';

    // SPIEGAZIONE LOGICA PUNTI
    h+='<div style="margin:12px 16px 0;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:16px;padding:16px;border:1px solid #bbf7d0">';
    h+='<div style="font-size:14px;font-weight:800;color:#15803d;margin-bottom:8px">&#128204; Come funzionano i tuoi punti</div>';
    h+='<div style="font-size:13px;color:#166534;line-height:1.7">';
    h+='&#8226; <strong>Punti locale:</strong> accumulati visitando e interagendo con un locale specifico. Spendibili solo in quel locale per sconti e vantaggi.<br>';
    h+='&#8226; <strong>Punti globali Ristoflow:</strong> somma di tutti i punti di tutti i locali + punti social. Sblocca i premi esclusivi Ristoflow qui sotto.';

  window.salvaProfilo=async function(){

  window.cambiaFotoProfilo=function(){
    var i=document.createElement("input");i.type="file";i.accept="image/*";
    i.onchange=async function(e){
      var f=e.target.files[0];if(!f)return;
      var ext=f.name.split(".").pop().toLowerCase();
      var path="avatar/"+ME.id+"."+ext;
      var{error:upErr}=await supa.storage.from("profili").upload(path,f,{cacheControl:"3600",upsert:true});
      if(upErr){alert("Errore: "+upErr.message);return;}
      var{data:ud}=supa.storage.from("profili").getPublicUrl(path);
      await supa.from("clienti_profilo").upsert({user_id:ME.id,avatar_url:ud.publicUrl},{onConflict:"user_id"});
      navTo("profilo");
    };
    i.click();
  };

  function hide(id){var e=document.getElementById(id);if(e)e.style.display="none";}
  function val(id){var e=document.getElementById(id);return e?e.value.trim():"";}
  function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function formatData(ts){if(!ts)return"";return new Date(ts).toLocaleDateString("it-IT",{day:"2-digit",month:"short"});}

  // ── STORIA VIEWER ─────────────────────────────────────────────────────────────
  var storieList=[],storiaIdx=0,storiaTimer=null;
  window.apriStoria=function(items,idx){
    if(!items||!items.length)return;
    storieList=items;storiaIdx=idx||0;
    document.getElementById("storia-viewer").classList.add("open");
    mostraStoria(storiaIdx);
  };
  window.mostraStoria=function(idx){
    if(storiaTimer)clearTimeout(storiaTimer);
    var s=storieList[idx];if(!s){chiudiStoriaViewer();return;}
    var nome=s.nome_completo||s.nome||"?";
    document.getElementById("storia-av-el").textContent=nome.charAt(0).toUpperCase();
    document.getElementById("storia-nome-el").textContent=nome;
    document.getElementById("storia-ora-el").textContent=formatData(s.created_at);
    var media=document.getElementById("storia-media-el");
    if(s.media_url){
      var isVid=/\.(mp4|mov|webm)(\?|$)/i.test(s.media_url);
      if(isVid){var v=document.createElement("video");v.src=s.media_url;v.autoplay=true;v.playsInline=true;v.muted=true;v.style.cssText="max-width:100%;max-height:100%";media.innerHTML="";media.appendChild(v);}
      else{var img=document.createElement("img");img.src=s.media_url;img.style.cssText="max-width:100%;max-height:100%;object-fit:contain";media.innerHTML="";media.appendChild(img);}
    }else{media.innerHTML='<div style="font-size:80px;color:#fff">&#127837;</div>';}
    var tEl=document.getElementById("storia-testo-el");
    var t=s.testo&&s.testo.trim()&&s.testo.trim()!==" ";
    tEl.innerHTML=t?'<p>'+esc(s.testo)+'</p>':"";
    var prog=document.getElementById("storia-progress");
    prog.innerHTML=storieList.map(function(_,i){return'<div class="storia-bar"><div class="storia-bar-fill" id="sp-'+i+'"></div></div>';}).join("");
    for(var i=0;i<idx;i++){var f=document.getElementById("sp-"+i);if(f)f.style.width="100%";}
    var fill=document.getElementById("sp-"+idx);
    if(fill){setTimeout(function(){fill.style.transition="width 5s linear";fill.style.width="100%";},50);}
    storiaTimer=setTimeout(function(){storiaIdx++;mostraStoria(storiaIdx);},5000);
  };
  window.chiudiStoriaViewer=function(){
    if(storiaTimer)clearTimeout(storiaTimer);
    document.getElementById("storia-viewer").classList.remove("open");
    storieList=[];storiaIdx=0;storiaTimer=null;
  };


  window.apriStoriaEncoded=function(el){
