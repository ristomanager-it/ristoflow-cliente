
<div style="padding:20px;max-width:500px;margin:0 auto">
  <canvas id="c192" width="192" height="192" style="display:none"></canvas>
  <canvas id="c32" width="32" height="32" style="display:none"></canvas>
  <canvas id="c16" width="16" height="16" style="display:none"></canvas>
  <div style="display:flex;gap:16px;align-items:flex-end;margin-bottom:20px;flex-wrap:wrap">
    <div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">192px</div>
      <canvas id="prev192" width="192" height="192" style="border-radius:40px;display:block"></canvas>
    </div>
    <div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">32px</div>
      <canvas id="prev32" width="32" height="32" style="border-radius:6px;display:block;image-rendering:pixelated"></canvas>
    </div>
    <div>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:6px">16px</div>
      <canvas id="prev16" width="16" height="16" style="border-radius:3px;display:block;image-rendering:pixelated"></canvas>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <a id="dl192" download="favicon-192.png" style="display:block;padding:12px 20px;background:#0E5A7A;color:#fff;border-radius:10px;text-align:center;font-size:14px;font-weight:500;text-decoration:none">Scarica favicon-192.png</a>
    <a id="dl32" download="favicon-32.png" style="display:block;padding:12px 20px;background:#0E5A7A;color:#fff;border-radius:10px;text-align:center;font-size:14px;font-weight:500;text-decoration:none">Scarica favicon-32.png</a>
    <a id="dl16" download="favicon-16.png" style="display:block;padding:12px 20px;background:#f97316;color:#fff;border-radius:10px;text-align:center;font-size:14px;font-weight:500;text-decoration:none">Scarica favicon-16.png</a>
  </div>
</div>
<script>
function drawFavicon(canvas, size) {
  var ctx = canvas.getContext('2d');
  var r = size * 0.22;
  ctx.clearRect(0, 0, size, size);

  // Sfondo blu con angoli arrotondati
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0E5A7A';
  ctx.fill();

  var cx = size / 2;
  var cy = size / 2;

  // R filigrana
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + Math.round(size * 0.72) + 'px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', cx, cy + size * 0.07);
  ctx.restore();

  var sw = Math.max(2, size * 0.055);
  var angle = 28 * Math.PI / 180;

  // FORCHETTA arancio (inclinata sx)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-angle);
  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = sw;
  ctx.lineCap = 'round';

  var forkX = -size * 0.08;
  var stemTop = -size * 0.18;
  var stemBot = size * 0.32;
  var teethTop = -size * 0.42;
  var teethBot = stemTop;
  var spread = size * 0.075;

  // stelo
  ctx.beginPath();
  ctx.moveTo(forkX, stemBot);
  ctx.lineTo(forkX, stemTop);
  ctx.stroke();

  // 4 denti
  var offsets = [-1.5, -0.5, 0.5, 1.5];
  offsets.forEach(function(o) {
    ctx.beginPath();
    ctx.moveTo(forkX + o * spread * 0.67, teethTop);
    ctx.lineTo(forkX + o * spread * 0.67, teethBot);
    ctx.stroke();
  });

  // arco base denti
  ctx.beginPath();
  ctx.moveTo(forkX - spread, teethBot);
  ctx.quadraticCurveTo(forkX, teethBot + size * 0.08, forkX + spread, teethBot);
  ctx.stroke();

  ctx.restore();

  // COLTELLO DA CARNE verde (inclinato dx)
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  var kx = size * 0.08;
  var kStemTop = -size * 0.15;
  var kStemBot = size * 0.32;
  var kBladeTop = -size * 0.43;
  var kW = size * 0.07;

  // manico
  ctx.fillStyle = '#00c896';
  ctx.beginPath();
  ctx.roundRect(kx - kW/2, kStemTop + size*0.02, kW, kStemBot - kStemTop - size*0.02, size*0.03);
  ctx.fill();

  // guardia
  ctx.beginPath();
  ctx.roundRect(kx - kW*0.9, kStemTop - size*0.02, kW*1.8, size*0.05, size*0.02);
  ctx.fill();

  // lama ampia coltello da carne
  ctx.beginPath();
  ctx.moveTo(kx - kW/2, kStemTop);
  ctx.lineTo(kx - kW/2, kBladeTop);
  ctx.quadraticCurveTo(kx - kW/2, kBladeTop - size*0.02, kx + kW*0.9, kBladeTop + size*0.08);
  ctx.lineTo(kx + kW*0.9, kStemTop);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

window.onload = function() {
  ['192','32','16'].forEach(function(s) {
    var size = parseInt(s);
    var c = document.getElementById('c' + s);
    var p = document.getElementById('prev' + s);
    drawFavicon(c, size);
    drawFavicon(p, size);
    document.getElementById('dl' + s).href = c.toDataURL('image/png');
  });
};
</script>
